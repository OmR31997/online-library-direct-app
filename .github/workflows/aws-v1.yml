name: Deploy AWS EC2

on:
  push:
    branches:
      - dev   # trigger only when pushing to dev branch

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 via PM2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            cd ~/online-library-direct-app
            git fetch --all
            git reset --hard origin/dev
            npm ci --legacy-peer-deps
            npx prisma generate
            npx prisma migrate deploy || echo "Migrations skipped"
            npm run build
            PORT=3000 pm2 restart online-library-direct-app || PORT=3000 pm2 start npm --name "online-library-direct-app" -- start
            pm2 save
          '
