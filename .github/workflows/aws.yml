# This workflow is configured to deploy to an Amazon EC2 instance using PM2.
# The Docker, ECR, and ECS steps are commented out as they are not used in this project.
#
# To use this workflow, you need to store the following GitHub Actions secrets:
# 1. EC2_SSH_KEY - The private SSH key used to access your EC2 instance.
# 2. EC2_HOST - The public IP or DNS host of your EC2 instance.
# 3. EC2_USER - The username used to log in (e.g., ubuntu, ec2-user).

name: Deploy to Amazon EC2

on:
  push:
    branches: [ "main" ]

# Unused ECR/ECS environment variables (commented out)
# env:
#   AWS_REGION: MY_AWS_REGION                   # set this to your preferred AWS region, e.g. us-west-1
#   ECR_REPOSITORY: MY_ECR_REPOSITORY           # set this to your Amazon ECR repository name
#   ECS_SERVICE: MY_ECS_SERVICE                 # set this to your Amazon ECS service name
#   ECS_CLUSTER: MY_ECS_CLUSTER                 # set this to your Amazon ECS cluster name
#   ECS_TASK_DEFINITION: .aws/task-definition.json # set this to the path to your Amazon ECS task definition
#                                                # file, e.g. .aws/task-definition.json
#   CONTAINER_NAME: online-library-container           # set this to the name of the container in the
#                                                # containerDefinitions section of your task definition

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ==========================================
