    #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
    #   with:
    #     task-definition: ${{ steps.task-def.outputs.task-definition }}
    #     service: ${{ env.ECS_SERVICE }}
    #     cluster: ${{ env.ECS_CLUSTER }}
    #     wait-for-service-stability: true

    # ==========================================
    # ACTIVE STEPS (EC2 SSH & PM2 Deployment)
    # ==========================================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2 via PM2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
          # Define search paths for the repository
          SEARCH_PATHS=(
            "/var/www/app"
            "$HOME/online-library-direct-app"
            "$HOME/online-library-pm2"
            "$HOME/online-library"
            "/var/www/online-library-pm2"
          )
          
          REPO_DIR=""
          for path in "${SEARCH_PATHS[@]}"; do
            # Resolve env vars like $HOME
            resolved_path=$(eval echo "$path")
            if [ -d "$resolved_path/.git" ]; then
              REPO_DIR="$resolved_path"
              break
            fi
          done

          if [ -n "$REPO_DIR" ]; then
            echo "Found repository at: $REPO_DIR"
            cd "$REPO_DIR"
            echo "Updating code..."
            git fetch --all
            git reset --hard origin/main
            echo "Running deployment script..."
            bash var/www/app/deploy.sh
          else
            echo "Repository not found on EC2. Setting up new deployment at $HOME/online-library-direct-app..."
            mkdir -p "$HOME/online-library-direct-app"
            git clone https://github.com/OmR31997/online-library-direct-app.git "$HOME/online-library-direct-app"
            cd "$HOME/online-library-direct-app"
            echo "Running deployment script..."
            bash var/www/app/deploy.sh
          fi
        '
